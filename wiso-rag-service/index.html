<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WiSo Chatbot</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 760px; margin: 40px auto; padding: 0 16px; }
    .card { border: 1px solid #ddd; border-radius: 12px; padding: 16px; }
    .row { display: flex; gap: 8px; }
    input { flex: 1; padding: 10px 12px; border-radius: 10px; border: 1px solid #ccc; font-size: 14px; }
    input:disabled { background: #f5f5f5; color: #999; }
    button { padding: 10px 14px; border-radius: 10px; border: 1px solid #ccc; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #chat { margin-top: 12px; display: flex; flex-direction: column; gap: 10px; }
    .msg { padding: 10px 12px; border-radius: 10px; border: 1px solid #eee; white-space: pre-wrap; word-break: break-word; }
    .me { align-self: flex-end; background: #eef5ff; border-color: #d7e7ff; }
    .bot { align-self: flex-start; background: #f7f7f7; }
    .header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .header-row h1 { margin: 0; font-size: 1.4rem; }
    .nav-links { display: flex; gap: 8px; }
    .nav-link { font-size: 0.8rem; color: #888; text-decoration: none; padding: 4px 10px; border: 1px solid #ddd; border-radius: 8px; transition: all 0.15s; }
    .nav-link:hover { color: #f59e0b; border-color: #f59e0b; }
    .debug-badge { font-size: 0.75rem; background: #ff9800; color: white; border-radius: 6px; padding: 2px 8px; margin-left: 8px; vertical-align: middle; }
    #debug-toggle { background: #f0f0f0; font-size: 0.85rem; }
    #debug-toggle.active { background: #ff9800; color: white; border-color: #ff9800; }

    .typing { display: flex; align-items: center; gap: 4px; padding: 14px 16px; }
    .typing .dot { width: 8px; height: 8px; border-radius: 50%; background: #bbb; animation: bounce 1.4s infinite both; }
    .typing .dot:nth-child(2) { animation-delay: 0.2s; }
    .typing .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.5); opacity: 0.5; }
      40% { transform: scale(1); opacity: 1; }
    }

    .streaming::after {
      content: '\u2588';
      animation: blink 0.8s infinite;
      color: #f59e0b;
    }
    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    .debug-panel { font-size: 0.8rem; background: #1e1e1e; color: #d4d4d4; border-radius: 8px; padding: 10px; margin-top: 4px; align-self: flex-start; width: 100%; box-sizing: border-box; }
    .debug-chunk { margin-bottom: 8px; border-bottom: 1px solid #444; padding-bottom: 8px; }
    .debug-chunk:last-child { border-bottom: none; margin-bottom: 0; }
    .debug-score { color: #4ec9b0; font-weight: bold; }
    .debug-id { color: #9cdcfe; }
    .debug-preview { color: #ce9178; display: block; margin-top: 4px; }
    .timing { color: #888; font-size: 0.75rem; display: block; margin-bottom: 8px; }

    .new-chat-btn { font-size: 0.8rem; color: #dc2626; background: none; border: 1px solid #fecaca; border-radius: 8px; padding: 4px 10px; cursor: pointer; transition: all 0.15s; }
    .new-chat-btn:hover { background: #fee2e2; border-color: #dc2626; }

    /* Feedback buttons */
    .feedback-row { display: flex; gap: 6px; margin-top: 6px; align-self: flex-start; }
    .fb-btn { background: none; border: 1px solid #ddd; border-radius: 8px; padding: 4px 12px; cursor: pointer; font-size: 15px; transition: all 0.15s; line-height: 1; }
    .fb-btn:hover { background: #f5f5f5; border-color: #bbb; }
    .fb-btn.selected-up { border-color: #16a34a; background: #dcfce7; }
    .fb-btn.selected-down { border-color: #dc2626; background: #fee2e2; }
    .fb-btn.dimmed { opacity: 0.25; cursor: default; pointer-events: none; }
  </style>
</head>

<body>
  <div class="header-row">
    <h1>WiSo Chatbot <span id="debug-indicator" style="display:none" class="debug-badge">🔍 DEBUG</span></h1>
    <div class="nav-links">
      <button class="new-chat-btn" onclick="clearChat()" title="Neuen Chat starten">🗑 Neuer Chat</button>
      <a href="/analytics" class="nav-link" target="_blank">📊 Analytics</a>
      <a href="/inspector" class="nav-link" target="_blank">🔬 Inspector</a>
    </div>
  </div>

  <div class="card">
    <div class="row">
      <input id="msg" placeholder="Schreib deine Frage..." />
      <button id="send">Senden</button>
      <button id="debug-toggle" title="Debug Mode ein/aus">🔍</button>
    </div>

    <div id="chat">
      <div class="msg bot">Hi! 👋 Stell eine Frage.</div>
    </div>
  </div>

  <script>
    var msg = document.getElementById('msg');
    var chat = document.getElementById('chat');
    var sendBtn = document.getElementById('send');
    var debugToggle = document.getElementById('debug-toggle');
    var debugIndicator = document.getElementById('debug-indicator');

    var STORAGE_KEY = 'wiso_chat_history';
    var HISTORY_KEY = 'wiso_conv_history';
    var debugMode = false;
    var isStreaming = false;
    var conversationHistory = [];

    // --- Chat persistence ---
    function saveChat() {
      try {
        var messages = [];
        chat.querySelectorAll('.msg, .feedback-row').forEach(function(el) {
          if (el.id === 'typing-indicator') return;
          if (el.classList.contains('debug-panel')) return;
          if (el.classList.contains('me')) {
            messages.push({ who: 'me', text: el.textContent });
          } else if (el.classList.contains('bot') && !el.classList.contains('typing')) {
            messages.push({ who: 'bot', text: el.textContent });
          } else if (el.classList.contains('feedback-row')) {
            var mid = el.dataset.messageId;
            var selected = el.querySelector('.selected-up, .selected-down');
            messages.push({ who: 'feedback', messageId: mid, rating: selected ? (selected.classList.contains('selected-up') ? 'up' : 'down') : null });
          }
        });
        sessionStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
        sessionStorage.setItem(HISTORY_KEY, JSON.stringify(conversationHistory));
      } catch (e) {}
    }

    function loadChat() {
      try {
        var saved = sessionStorage.getItem(STORAGE_KEY);
        var savedHistory = sessionStorage.getItem(HISTORY_KEY);
        if (savedHistory) conversationHistory = JSON.parse(savedHistory);
        if (!saved) return;
        var messages = JSON.parse(saved);
        if (!messages.length) return;
        chat.innerHTML = '';
        messages.forEach(function(m) {
          if (m.who === 'me') {
            addMessage('me', m.text, false);
          } else if (m.who === 'bot') {
            addMessage('bot', m.text, false);
          } else if (m.who === 'feedback') {
            addFeedbackButtons(m.messageId, m.rating, false);
          }
        });
      } catch (e) {}
    }

    function clearChat() {
      sessionStorage.removeItem(STORAGE_KEY);
      sessionStorage.removeItem(HISTORY_KEY);
      conversationHistory = [];
      chat.innerHTML = '';
      addMessage('bot', 'Hi! 👋 Stell eine Frage.', false);
    }

    function getRecentHistory(maxPairs) {
      return conversationHistory.slice(-(maxPairs * 2));
    }

    // --- Messages ---
    function addMessage(who, text, save) {
      if (save === undefined) save = true;
      var div = document.createElement('div');
      div.className = 'msg ' + (who === 'me' ? 'me' : 'bot');
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      if (save) saveChat();
      return div;
    }

    function addTypingIndicator() {
      var div = document.createElement('div');
      div.className = 'msg bot typing';
      div.id = 'typing-indicator';
      div.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function removeTypingIndicator() {
      var el = document.getElementById('typing-indicator');
      if (el) el.remove();
    }

    // --- Feedback ---
    function addFeedbackButtons(messageId, preselected, save) {
      if (save === undefined) save = true;
      var row = document.createElement('div');
      row.className = 'feedback-row';
      row.dataset.messageId = messageId;

      var upBtn = document.createElement('button');
      upBtn.className = 'fb-btn';
      upBtn.textContent = '👍';
      upBtn.onclick = function() { handleFeedback(row, 'up'); };

      var downBtn = document.createElement('button');
      downBtn.className = 'fb-btn';
      downBtn.textContent = '👎';
      downBtn.onclick = function() { handleFeedback(row, 'down'); };

      row.appendChild(upBtn);
      row.appendChild(downBtn);
      chat.appendChild(row);
      chat.scrollTop = chat.scrollHeight;

      if (preselected) {
        applyFeedbackState(row, preselected);
      }
      if (save) saveChat();
    }

    function applyFeedbackState(row, rating) {
      var buttons = row.querySelectorAll('.fb-btn');
      buttons.forEach(function(b) {
        b.classList.add('dimmed');
        b.onclick = null;
      });
      if (rating === 'up') {
        buttons[0].classList.remove('dimmed');
        buttons[0].classList.add('selected-up');
      } else {
        buttons[1].classList.remove('dimmed');
        buttons[1].classList.add('selected-down');
      }
    }

    function handleFeedback(row, rating) {
      var messageId = row.dataset.messageId;
      applyFeedbackState(row, rating);
      saveChat();
      fetch('/feedback', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message_id: messageId, rating: rating })
      }).catch(function(e) { console.error('Feedback failed:', e); });
    }

    // --- Debug ---
    debugToggle.addEventListener('click', function() {
      debugMode = !debugMode;
      debugToggle.classList.toggle('active', debugMode);
      debugIndicator.style.display = debugMode ? 'inline' : 'none';
    });

    function addDebugPanel(debugData) {
      var panel = document.createElement('div');
      panel.className = 'debug-panel';
      var html = '<strong>🔍 Retrieved Chunks</strong>';
      html += '<span class="timing">Retrieval: ' + debugData.retrieval_ms + 'ms | LLM: ' + debugData.llm_ms + 'ms | Modell: ' + debugData.model + '</span>';
      html += '<span class="timing">Top Score: ' + debugData.top_score + ' | Mode: ' + debugData.mode + ' | Verdict: ' + debugData.verdict + '</span>';
      html += '<span class="timing">Vec: ' + (debugData.vector_weight || 0).toFixed(2) + ' | BM25: ' + (debugData.bm25_weight || 0).toFixed(2) + ' | Search: ' + debugData.search_mode + '</span>';
      if (debugData.rewritten_query) {
        html += '<span class="timing">Rewritten: "' + debugData.rewritten_query + '"</span>';
      }
      debugData.retrieved_chunks.forEach(function(chunk) {
        html += '<div class="debug-chunk">';
        html += '<span class="debug-score">#' + chunk.rank + ' Score: ' + chunk.combined_score + '</span> ';
        html += '<span class="debug-id">[' + chunk.id + ']</span>';
        html += '<span style="color:#569cd6;margin-left:8px;">vec:' + chunk.vector_score + ' bm25:' + chunk.bm25_score + '</span>';
        html += '<span class="debug-preview">' + chunk.preview + '</span>';
        html += '</div>';
      });
      panel.innerHTML = html;
      chat.appendChild(panel);
      chat.scrollTop = chat.scrollHeight;
    }

    // --- Streaming ---
    function sendStreaming(text) {
      addTypingIndicator();
      fetch('/chat/stream', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, history: getRecentHistory(3) })
      }).then(function(res) {
        if (!res.ok) {
          removeTypingIndicator();
          addMessage('bot', 'Fehler: HTTP ' + res.status);
          return Promise.resolve();
        }
        var reader = res.body.getReader();
        var decoder = new TextDecoder();
        var botDiv = null;
        var fullText = '';
        var buffer = '';
        var messageId = null;

        function processChunk(result) {
          if (result.done) return;
          buffer += decoder.decode(result.value, { stream: true });
          var lines = buffer.split('\n');
          buffer = lines.pop();

          for (var i = 0; i < lines.length; i++) {
            var line = lines[i];
            if (line.indexOf('data: ') !== 0) continue;
            var jsonStr = line.slice(6).trim();
            if (!jsonStr) continue;
            try {
              var event = JSON.parse(jsonStr);

              if (event.type === 'meta') {
                removeTypingIndicator();
                botDiv = document.createElement('div');
                botDiv.className = 'msg bot streaming';
                chat.appendChild(botDiv);
                chat.scrollTop = chat.scrollHeight;
              }

              if (event.type === 'token' && botDiv) {
                fullText += event.content;
                botDiv.textContent = fullText;
                chat.scrollTop = chat.scrollHeight;
              }

              if (event.type === 'token' && !botDiv) {
                removeTypingIndicator();
                botDiv = document.createElement('div');
                botDiv.className = 'msg bot';
                botDiv.textContent = event.content;
                fullText = event.content;
                chat.appendChild(botDiv);
              }

              if (event.type === 'done') {
                if (botDiv) botDiv.classList.remove('streaming');
                messageId = event.message_id;
                conversationHistory.push({ role: "assistant", content: fullText });
                if (event.mode !== 'REJECT' && messageId) {
                  addFeedbackButtons(messageId);
                }
                saveChat();
              }
            } catch (e) {}
          }
          return reader.read().then(processChunk);
        }
        return reader.read().then(processChunk);
      }).catch(function(e) {
        removeTypingIndicator();
        addMessage('bot', 'Fehler: Server nicht erreichbar.');
      });
    }

    // --- Debug mode ---
    function sendDebug(text) {
      addTypingIndicator();
      fetch('/chat?debug=true', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, history: getRecentHistory(3) })
      }).then(function(res) {
        removeTypingIndicator();
        if (!res.ok) {
          addMessage('bot', 'Fehler: HTTP ' + res.status);
          return;
        }
        return res.json();
      }).then(function(data) {
        if (!data) return;
        var reply = data.reply || '(keine Antwort)';
        addMessage('bot', reply);
        conversationHistory.push({ role: "assistant", content: reply });
        if (data.message_id && (!data.debug || data.debug.mode !== 'REJECT')) {
          addFeedbackButtons(data.message_id);
        }
        saveChat();
        if (data.debug) addDebugPanel(data.debug);
      }).catch(function(e) {
        removeTypingIndicator();
        addMessage('bot', 'Fehler: Server nicht erreichbar.');
      });
    }

    // --- Send ---
    function send() {
      var text = msg.value.trim();
      if (!text || isStreaming) return;
      addMessage('me', text);
      conversationHistory.push({ role: "user", content: text });
      msg.value = '';
      isStreaming = true;
      sendBtn.disabled = true;
      msg.disabled = true;

      function done() {
        isStreaming = false;
        sendBtn.disabled = false;
        msg.disabled = false;
        msg.focus();
      }

      if (debugMode) {
        sendDebug(text);
        // Debug is sync-ish via .then, re-enable after short delay
        setTimeout(done, 500);
      } else {
        sendStreaming(text);
        setTimeout(done, 500);
      }
    }

    sendBtn.addEventListener('click', send);
    msg.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') send();
    });

    loadChat();
  </script>
</body>
</html>
