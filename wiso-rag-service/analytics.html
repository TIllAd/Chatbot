<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WiSo Chatbot — Analytics</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fafaf9; --surface: #ffffff; --border: #e7e5e4;
    --text: #1c1917; --text-mid: #57534e; --text-dim: #a8a29e;
    --accent: #f59e0b; --accent-light: #fef3c7; --accent-dark: #d97706;
    --green: #16a34a; --green-light: #dcfce7;
    --red: #dc2626; --red-light: #fee2e2;
    --blue: #2563eb; --blue-light: #dbeafe;
    --purple: #7c3aed; --purple-light: #ede9fe;
    --radius: 16px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; min-height: 100vh; }

  .header { padding: 32px 40px 24px; display: flex; align-items: flex-end; justify-content: space-between; }
  .header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
  .header h1 span { color: var(--accent-dark); }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .header-right a { font-size: 14px; color: var(--text-dim); text-decoration: none; padding: 8px 16px; border: 1px solid var(--border); border-radius: 10px; transition: all 0.15s; }
  .header-right a:hover { border-color: var(--accent); color: var(--accent-dark); }
  .last-updated { font-size: 13px; color: var(--text-dim); }

  .stats-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; padding: 0 40px; margin-bottom: 32px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; position: relative; overflow: hidden; }
  .stat-card .label { font-size: 13px; font-weight: 500; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .stat-card .value { font-size: 36px; font-weight: 700; letter-spacing: -1px; line-height: 1; }
  .stat-card .sub { font-size: 13px; color: var(--text-dim); margin-top: 6px; }
  .stat-card .icon { position: absolute; top: 20px; right: 20px; width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .icon-total { background: var(--blue-light); }
  .icon-score { background: var(--accent-light); }
  .icon-speed { background: var(--green-light); }
  .icon-reject { background: var(--red-light); }
  .icon-feedback { background: var(--green-light); }

  .content { padding: 0 40px 40px; display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .card-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .card-header h2 { font-size: 16px; font-weight: 600; }
  .card-header .badge { font-size: 12px; padding: 4px 10px; border-radius: 20px; font-weight: 500; }
  .card-body { padding: 20px 24px; }

  .mode-bar { display: flex; height: 40px; border-radius: 10px; overflow: hidden; margin-bottom: 16px; cursor: pointer; }
  .mode-bar div { transition: all 0.3s ease; position: relative; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: white; }
  .mode-bar div:hover { filter: brightness(1.15); }
  .mode-bar div.dimmed { opacity: 0.3; }
  .mode-bar div .bar-label { pointer-events: none; text-shadow: 0 1px 2px rgba(0,0,0,0.3); }
  .mode-answer { background: var(--green); }
  .mode-caution { background: var(--accent); }
  .mode-reject { background: var(--red); }

  .mode-legend { display: flex; gap: 16px; flex-wrap: wrap; }
  .mode-legend-item { display: flex; align-items: center; gap: 6px; font-size: 14px; cursor: pointer; padding: 4px 8px; border-radius: 8px; transition: all 0.15s; user-select: none; }
  .mode-legend-item:hover { background: var(--bg); }
  .mode-legend-item.active { outline: 2px solid var(--text); outline-offset: 1px; }
  .mode-legend-item .dot { width: 10px; height: 10px; border-radius: 50%; }
  .mode-legend-item .count { font-family: 'JetBrains Mono', monospace; font-weight: 500; color: var(--text-mid); }

  .filter-hint { font-size: 12px; color: var(--text-dim); margin-top: 12px; font-style: italic; text-align: center; }
  .filter-active-hint { font-size: 13px; color: var(--accent-dark); font-weight: 500; margin-top: 12px; text-align: center; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .clear-filter { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 2px 10px; font-size: 12px; cursor: pointer; color: var(--text-mid); font-family: 'Outfit', sans-serif; }
  .clear-filter:hover { border-color: var(--red); color: var(--red); }

  .perf-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 20px; }
  .perf-item { background: var(--bg); border-radius: 12px; padding: 16px; text-align: center; }
  .perf-item .perf-value { font-size: 28px; font-weight: 700; letter-spacing: -1px; }
  .perf-item .perf-label { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
  .perf-retrieval .perf-value { color: var(--blue); }
  .perf-llm .perf-value { color: var(--purple); }

  .score-bars { display: flex; flex-direction: column; gap: 8px; }
  .score-row { display: flex; align-items: center; gap: 12px; cursor: pointer; border-radius: 8px; padding: 2px 0; transition: background 0.15s; }
  .score-row:hover { background: var(--bg); }
  .score-label { font-size: 13px; font-family: 'JetBrains Mono', monospace; width: 60px; color: var(--text-mid); text-align: right; }
  .score-track { flex: 1; height: 28px; background: var(--bg); border-radius: 6px; overflow: hidden; }
  .score-fill { height: 100%; border-radius: 6px; transition: width 0.8s ease; display: flex; align-items: center; justify-content: flex-end; padding-right: 10px; font-size: 12px; font-family: 'JetBrains Mono', monospace; font-weight: 500; color: white; min-width: 28px; }
  .fill-high { background: var(--green); }
  .fill-mid { background: var(--accent); }
  .fill-low { background: var(--red); }

  .full-width { grid-column: 1 / -1; }
  .query-list { max-height: 500px; overflow-y: auto; }
  .query-list::-webkit-scrollbar { width: 4px; }
  .query-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .query-item { padding: 14px 0; border-bottom: 1px solid var(--border); animation: fadeIn 0.3s ease; }
  .query-item:last-child { border-bottom: none; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  .query-question { font-size: 15px; font-weight: 500; margin-bottom: 6px; }
  .query-answer { font-size: 13px; color: var(--text-mid); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .query-meta { display: flex; gap: 10px; margin-top: 8px; font-size: 12px; font-family: 'JetBrains Mono', monospace; flex-wrap: wrap; }
  .query-meta span { padding: 2px 8px; border-radius: 6px; }
  .meta-score { background: var(--accent-light); color: var(--accent-dark); }
  .meta-time { background: var(--blue-light); color: var(--blue); }
  .meta-timestamp { color: var(--text-dim); }
  .meta-mode { font-weight: 500; }
  .meta-mode.ANSWER { background: var(--green-light); color: var(--green); }
  .meta-mode.ANSWER_WITH_CAUTION { background: var(--accent-light); color: var(--accent-dark); }
  .meta-mode.REJECT { background: var(--red-light); color: var(--red); }
  .meta-mode.LLM_REJECT { background: var(--purple-light); color: var(--purple); }
  .meta-feedback { font-weight: 500; }
  .meta-feedback.fb-up { background: var(--green-light); color: var(--green); }
  .meta-feedback.fb-down { background: var(--red-light); color: var(--red); }

  .feedback-filters { display: flex; gap: 8px; margin-top: 12px; justify-content: center; }
  .fb-filter { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 4px 14px; cursor: pointer; font-size: 13px; font-family: 'Outfit', sans-serif; transition: all 0.15s; }
  .fb-filter:hover { border-color: var(--accent); }
  .fb-filter.active { border-color: var(--accent-dark); background: var(--accent-light); color: var(--accent-dark); font-weight: 500; }

  .empty-state { text-align: center; padding: 40px; color: var(--text-dim); font-size: 14px; }
  .loading { text-align: center; padding: 60px; color: var(--text-dim); font-size: 16px; }

  @media (max-width: 900px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .content { grid-template-columns: 1fr; }
    .header, .stats-grid, .content { padding-left: 20px; padding-right: 20px; }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>📊 WiSo Chatbot <span>Analytics</span></h1>
    <div class="last-updated" id="lastUpdated">Lade Daten...</div>
  </div>
  <div class="header-right">
    <a href="/">← Chatbot</a>
    <a href="/inspector">🔬 Inspector</a>
  </div>
</div>

<div class="stats-grid" id="statsGrid">
  <div class="stat-card"><div class="label">Laden...</div><div class="value">—</div></div>
  <div class="stat-card"><div class="label">Laden...</div><div class="value">—</div></div>
  <div class="stat-card"><div class="label">Laden...</div><div class="value">—</div></div>
  <div class="stat-card"><div class="label">Laden...</div><div class="value">—</div></div>
  <div class="stat-card"><div class="label">Laden...</div><div class="value">—</div></div>
</div>

<div class="content" id="mainContent">
  <div class="loading">Lade Dashboard...</div>
</div>

<script>
var API = '';
var allLogs = [];
var allStats = {};
var activeFilter = null;
var feedbackFilter = null; // null, 'up', 'down'

function loadDashboard() {
  var feedbackParam = feedbackFilter ? '&feedback=' + feedbackFilter : '';
  Promise.all([
    fetch(API + '/logs/stats'),
    fetch(API + '/logs?limit=200' + feedbackParam)
  ]).then(function(responses) {
    return Promise.all([responses[0].json(), responses[1].json()]);
  }).then(function(data) {
    allStats = data[0];
    allLogs = data[1].logs || [];
    try {
      render();
    } catch (e) {
      document.getElementById('mainContent').innerHTML =
        '<div class="loading">Render-Fehler: ' + e.message + '</div>';
      console.error('Render error:', e);
    }
  }).catch(function(e) {
    document.getElementById('mainContent').innerHTML =
      '<div class="loading">Verbindungsfehler. Ist der Server aktiv?</div>';
    console.error('Fetch error:', e);
  });
}

function setFilter(mode) {
  activeFilter = activeFilter === mode ? null : mode;
  render();
}

function setFeedbackFilter(value) {
  feedbackFilter = feedbackFilter === value ? null : value;
  loadDashboard();
}

function render() {
  var stats = allStats;
  var logs = allLogs;
  var filtered = activeFilter ? logs.filter(function(l) { return l.mode === activeFilter; }) : logs;
  renderStats(stats);
  renderContent(stats, logs, filtered);
}

function renderStats(stats) {
  var rejectCount = (stats.modes && stats.modes.REJECT) || 0;
  var rejectPct = stats.total > 0 ? Math.round(rejectCount / stats.total * 100) : 0;
  var answerCount = ((stats.modes && stats.modes.ANSWER) || 0) + ((stats.modes && stats.modes.ANSWER_WITH_CAUTION) || 0);

  document.getElementById('statsGrid').innerHTML =
    '<div class="stat-card">' +
      '<div class="icon icon-total">💬</div>' +
      '<div class="label">Gesamte Anfragen</div>' +
      '<div class="value">' + stats.total + '</div>' +
      '<div class="sub">' + answerCount + ' beantwortet</div>' +
    '</div>' +
    '<div class="stat-card">' +
      '<div class="icon icon-score">🎯</div>' +
      '<div class="label">Ø Confidence Score</div>' +
      '<div class="value">' + (stats.avg_top_score * 100).toFixed(0) + '%</div>' +
      '<div class="sub">Top-Chunk Ähnlichkeit</div>' +
    '</div>' +
    '<div class="stat-card">' +
      '<div class="icon icon-speed">⚡</div>' +
      '<div class="label">Ø Antwortzeit</div>' +
      '<div class="value">' + (stats.avg_llm_ms > 0 ? ((stats.avg_retrieval_ms + stats.avg_llm_ms) / 1000).toFixed(1) + 's' : '—') + '</div>' +
      '<div class="sub">Retrieval + LLM</div>' +
    '</div>' +
    '<div class="stat-card">' +
      '<div class="icon icon-reject">🚫</div>' +
      '<div class="label">Abgelehnt</div>' +
      '<div class="value">' + rejectPct + '%</div>' +
      '<div class="sub">' + rejectCount + ' von ' + stats.total + ' Anfragen</div>' +
    '</div>' +
    '<div class="stat-card">' +
      '<div class="icon icon-feedback">👍</div>' +
      '<div class="label">Zufriedenheit</div>' +
      '<div class="value">' + (stats.feedback_total > 0 ? (stats.satisfaction_rate * 100).toFixed(0) + '%' : '—') + '</div>' +
      '<div class="sub" style="display:flex;gap:6px;align-items:center;">' +
        '<span onclick="setFeedbackFilter(\'up\')" style="cursor:pointer;' + (feedbackFilter === 'up' ? 'font-weight:700;text-decoration:underline;' : '') + '">👍 ' + (stats.feedback_up || 0) + '</span> · ' +
        '<span onclick="setFeedbackFilter(\'down\')" style="cursor:pointer;' + (feedbackFilter === 'down' ? 'font-weight:700;text-decoration:underline;' : '') + '">👎 ' + (stats.feedback_down || 0) + '</span>' +
        ' (' + (stats.feedback_total || 0) + ' bewertet)' +
      '</div>' +
    '</div>';

  if (stats.last_log) {
    var d = new Date(stats.last_log);
    document.getElementById('lastUpdated').textContent =
      'Letzte Anfrage: ' + d.toLocaleDateString('de-DE') + ' um ' + d.toLocaleTimeString('de-DE', {hour:'2-digit',minute:'2-digit'});
  }
}

function renderContent(stats, logs, filtered) {
  var modeLabels = {
    'ANSWER': { emoji: '✅', label: 'Beantwortet', color: 'green' },
    'ANSWER_WITH_CAUTION': { emoji: '⚠️', label: 'Mit Rückfrage', color: 'accent' },
    'REJECT': { emoji: '🚫', label: 'Abgelehnt (Score)', color: 'red' },
    'LLM_REJECT': { emoji: '🤖', label: 'Abgelehnt (LLM)', color: 'purple' }
  };

  var scoreRanges = { '90-100%': 0, '80-89%': 0, '70-79%': 0, '60-69%': 0, '<60%': 0 };
  filtered.forEach(function(l) {
    var s = (l.top_score || 0) * 100;
    if (s >= 90) scoreRanges['90-100%']++;
    else if (s >= 80) scoreRanges['80-89%']++;
    else if (s >= 70) scoreRanges['70-79%']++;
    else if (s >= 60) scoreRanges['60-69%']++;
    else scoreRanges['<60%']++;
  });
  var maxCount = Math.max.apply(null, Object.values(scoreRanges).concat([1]));

  var total = stats.total || 1;
  var answerPct = ((stats.modes && stats.modes.ANSWER) || 0) / total * 100;
  var cautionPct = ((stats.modes && stats.modes.ANSWER_WITH_CAUTION) || 0) / total * 100;
  var rejectPct = ((stats.modes && stats.modes.REJECT) || 0) / total * 100;

  var filterInfo = activeFilter ? modeLabels[activeFilter] : null;

  var modeBarHtml = '';
  if (stats.modes && stats.modes.ANSWER) modeBarHtml += '<div class="mode-answer ' + (activeFilter && activeFilter !== 'ANSWER' ? 'dimmed' : '') + '" style="width:' + answerPct + '%" onclick="setFilter(\'ANSWER\')"><span class="bar-label">' + stats.modes.ANSWER + '</span></div>';
  if (stats.modes && stats.modes.ANSWER_WITH_CAUTION) modeBarHtml += '<div class="mode-caution ' + (activeFilter && activeFilter !== 'ANSWER_WITH_CAUTION' ? 'dimmed' : '') + '" style="width:' + cautionPct + '%" onclick="setFilter(\'ANSWER_WITH_CAUTION\')"><span class="bar-label">' + stats.modes.ANSWER_WITH_CAUTION + '</span></div>';
  if (stats.modes && stats.modes.REJECT) modeBarHtml += '<div class="mode-reject ' + (activeFilter && activeFilter !== 'REJECT' ? 'dimmed' : '') + '" style="width:' + rejectPct + '%" onclick="setFilter(\'REJECT\')"><span class="bar-label">' + stats.modes.REJECT + '</span></div>';
  if (stats.modes && stats.modes.LLM_REJECT) {
    var llmPct = (stats.modes.LLM_REJECT / total * 100);
    modeBarHtml += '<div style="background:var(--purple);width:' + llmPct + '%" class="' + (activeFilter && activeFilter !== 'LLM_REJECT' ? 'dimmed' : '') + '" onclick="setFilter(\'LLM_REJECT\')"><span class="bar-label">' + stats.modes.LLM_REJECT + '</span></div>';
  }

  var legendHtml = '';
  Object.keys(modeLabels).forEach(function(mode) {
    var info = modeLabels[mode];
    var count = (stats.modes && stats.modes[mode]) || 0;
    if (!count) return;
    legendHtml += '<div class="mode-legend-item ' + (activeFilter === mode ? 'active' : '') + '" onclick="setFilter(\'' + mode + '\')">';
    legendHtml += '<div class="dot" style="background:var(--' + info.color + ')"></div> ' + info.label + ' <span class="count">' + count + '</span>';
    legendHtml += '</div>';
  });

  var scoreHtml = '';
  Object.keys(scoreRanges).forEach(function(label) {
    var count = scoreRanges[label];
    var pct = (count / maxCount * 100);
    var fillClass = label.charAt(0) === '9' ? 'fill-high' : (label.charAt(0) === '8' || label.charAt(0) === '7') ? 'fill-mid' : 'fill-low';
    scoreHtml += '<div class="score-row"><div class="score-label">' + label + '</div><div class="score-track"><div class="score-fill ' + fillClass + '" style="width:' + (count > 0 ? Math.max(pct, 10) : 0) + '%">' + (count > 0 ? count : '') + '</div></div></div>';
  });

  var filterHtml = '';
  if (activeFilter && filterInfo) {
    filterHtml = '<div class="filter-active-hint">' + filterInfo.emoji + ' Zeige nur: <strong>' + filterInfo.label + '</strong> (' + filtered.length + ') <button class="clear-filter" onclick="setFilter(null)">✕ Filter aufheben</button></div>';
  } else {
    filterHtml = '<div class="filter-hint">Klicke auf einen Balken oder eine Kategorie zum Filtern</div>';
  }

  var queryHtml = '';
  if (filtered.length === 0) {
    queryHtml = '<div class="empty-state">Keine Anfragen in dieser Kategorie.</div>';
  } else {
    queryHtml = '<div class="query-list">';
    filtered.forEach(function(l) {
      var ts = new Date(l.timestamp);
      var timeStr = ts.toLocaleTimeString('de-DE', {hour:'2-digit',minute:'2-digit'});
      var dateStr = ts.toLocaleDateString('de-DE', {day:'2-digit',month:'2-digit'});
      var mInfo = modeLabels[l.mode] || { emoji: '', label: l.mode };
      queryHtml += '<div class="query-item">';
      queryHtml += '<div class="query-question">' + escapeHtml(l.question || '') + '</div>';
      queryHtml += '<div class="query-answer">' + escapeHtml(l.reply || '') + '</div>';
      queryHtml += '<div class="query-meta">';
      queryHtml += '<span class="meta-mode ' + (l.mode || '') + '">' + mInfo.emoji + ' ' + mInfo.label + '</span>';
      queryHtml += '<span class="meta-score">Score: ' + ((l.top_score || 0) * 100).toFixed(0) + '%</span>';
      queryHtml += '<span class="meta-time">' + (l.llm_ms > 0 ? ((l.retrieval_ms + l.llm_ms) / 1000).toFixed(1) + 's' : '—') + '</span>';
      queryHtml += '<span class="meta-timestamp">' + dateStr + ' ' + timeStr + '</span>';
      if (l.feedback === 'up') queryHtml += '<span class="meta-feedback fb-up">👍</span>';
      if (l.feedback === 'down') queryHtml += '<span class="meta-feedback fb-down">👎</span>';
      queryHtml += '</div></div>';
    });
    queryHtml += '</div>';
  }

  var cardTitle = activeFilter && filterInfo ? filterInfo.emoji + ' ' + filterInfo.label + ' — Alle Fragen' : '💬 Alle Anfragen';
  var badgeStyle = activeFilter === 'REJECT' ? 'background:var(--red-light);color:var(--red)' : 'background:var(--green-light);color:var(--green)';
  var badgeText = filtered.length + (activeFilter === 'REJECT' ? ' Luecken' : ' Anfragen');

  document.getElementById('mainContent').innerHTML =
    '<div class="card"><div class="card-header"><h2>Antwort-Modi</h2><span class="badge" style="background:var(--blue-light);color:var(--blue);">' + stats.total + ' gesamt</span></div><div class="card-body"><div class="mode-bar">' + modeBarHtml + '</div><div class="mode-legend">' + legendHtml + '</div>' + filterHtml + '<div class="perf-grid"><div class="perf-item perf-retrieval"><div class="perf-value">' + stats.avg_retrieval_ms + 'ms</div><div class="perf-label">Ø Retrieval</div></div><div class="perf-item perf-llm"><div class="perf-value">' + stats.avg_llm_ms + 'ms</div><div class="perf-label">Ø LLM</div></div></div></div></div>' +
    '<div class="card"><div class="card-header"><h2>Score-Verteilung' + (activeFilter && filterInfo ? ' (' + filterInfo.label + ')' : '') + '</h2><span class="badge" style="background:var(--accent-light);color:var(--accent-dark);">' + filtered.length + ' Anfragen</span></div><div class="card-body"><div class="score-bars">' + scoreHtml + '</div></div></div>' +
    '<div class="card full-width"><div class="card-header"><h2>' + cardTitle + '</h2><span class="badge" style="' + badgeStyle + ';">' + badgeText + '</span></div><div class="card-body">' + queryHtml + '</div></div>';
}

function escapeHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

loadDashboard();
setInterval(loadDashboard, 30000);
</script>
</body>
</html>
