name: WiSo Chatbot CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:  # manual trigger

jobs:
  # ─────────────────────────────────────────────
  # Kategorie 1: Code Quality
  # ─────────────────────────────────────────────
  code-quality:
    name: "1. Code Quality"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff lint
        run: ruff check . --output-format=github

      - name: Ruff format check
        run: ruff format --check .

      - name: Syntax check
        run: |
          python -m py_compile main.py
          python -m py_compile ingest.py
          python -m py_compile eval.py
          echo "All files compile OK"

  # ─────────────────────────────────────────────
  # Kategorie 2: Tests
  # ─────────────────────────────────────────────
  tests:
    name: "2. Tests"
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install pytest httpx
          pip install -r requirements.txt

      - name: Unit tests
        run: pytest tests/test_unit.py -v --tb=short

      - name: API tests
        run: pytest tests/test_api.py -v --tb=short

      - name: Retrieval / fallback tests
        run: pytest tests/test_retrieval.py -v --tb=short

  # ─────────────────────────────────────────────
  # Kategorie 3: Build
  # ─────────────────────────────────────────────
  build:
    name: "3. Build"
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t wiso-chatbot:test .

      - name: Container smoke test
        run: |
          docker run -d --name smoke-test \
            -e OPENAI_API_KEY=sk-test-dummy \
            -p 8000:8000 \
            wiso-chatbot:test || true
          sleep 5
          # Check if container is still running (didn't crash)
          if docker ps | grep -q smoke-test; then
            echo "Container is running"
          else
            echo "Container crashed!"
            docker logs smoke-test
            exit 1
          fi

      - name: Health endpoint check
        run: |
          # Container may not have ChromaDB data, so root might fail
          # But we can check if Uvicorn is responding
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/ || echo "000")
          echo "Health check status: $STATUS"
          if [ "$STATUS" = "000" ]; then
            echo "Server not responding"
            docker logs smoke-test
            exit 1
          fi
          echo "Server is responding"

      - name: Cleanup
        if: always()
        run: docker stop smoke-test || true

  # ─────────────────────────────────────────────
  # Kategorie 4: Evaluation
  # Nur auf main, braucht OPENAI_API_KEY
  # ─────────────────────────────────────────────
  evaluation:
    name: "4. Evaluation"
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install requests
          pip install -r requirements.txt

      - name: Check API key available
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY not set, skipping evaluation"
            exit 0
          fi
          echo "API key available"

      - name: Regression test (eval questions)
        if: env.OPENAI_API_KEY != ''
        run: |
          if [ -f tests/eval_questions.json ]; then
            python eval.py --file tests/eval_questions.json --url ${{ secrets.CHATBOT_URL || 'https://chatbot-wiso.de' }}
          else
            echo "No eval_questions.json found, skipping"
          fi

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: eval_results/
          if-no-files-found: ignore

  # ─────────────────────────────────────────────
  # Kategorie 5: Performance / Live Tests
  # Nur manuell oder auf main
  # ─────────────────────────────────────────────
  performance:
    name: "5. Performance / Live"
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch' || (github.ref == 'refs/heads/main' && github.event_name == 'push')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install requests

      - name: Check server reachable
        run: |
          URL="${{ secrets.CHATBOT_URL }}"
          if [ -z "$URL" ]; then
            URL="https://chatbot-wiso.de"
          fi
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || echo "000")
          echo "Server status: $STATUS"
          if [ "$STATUS" = "000" ] || [ "$STATUS" = "530" ]; then
            echo "Server not reachable, skipping live tests"
            exit 0
          fi

      - name: Rate limit test
        run: python tests/test_rate_limit.py --url ${{ secrets.CHATBOT_URL || 'https://chatbot-wiso.de' }}

      - name: Response time check
        run: |
          URL="${{ secrets.CHATBOT_URL || 'https://chatbot-wiso.de' }}"
          echo "Testing response time..."
          START=$(date +%s%N)
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$URL/chat" \
            -H "Content-Type: application/json" \
            -d '{"message":"Was ist Campo?"}' \
            --max-time 15)
          END=$(date +%s%N)
          ELAPSED=$(( (END - START) / 1000000 ))
          echo "Response: HTTP $STATUS in ${ELAPSED}ms"
          if [ "$ELAPSED" -gt 15000 ]; then
            echo "FAIL: Response took over 15 seconds"
            exit 1
          fi
          echo "PASS: Response within time limit"